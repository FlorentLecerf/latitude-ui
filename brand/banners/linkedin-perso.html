<!DOCTYPE html>
<html lang="fr">
<!--
  Bannière LinkedIn — profil perso Florent Lecerf · marque Latitude.
  Format : linkedin-perso-banner (1584 × 396) — cf. ../format-registry.json
  Direction : MIX A+B (reconnaissance-pouvoir + destination-loi), figée le 2026-06-30.
  Source de vérité COPY : ~/Agents/latitude-marque/editorial/visuels/banniere-linkedin-profil.md
  Tokens : thème sombre du design system (cf. ../../DESIGN.md §Color + ../../src/theme.css).

  RENDU (depuis ce dossier brand/banners/) — scale-factor=2 obligatoire (net sur Retina, sortie 3168×792) :
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
      --disable-gpu --force-device-scale-factor=2 --hide-scrollbars \
      --virtual-time-budget=4000 --window-size=1584,396 \
      --screenshot="linkedin-perso.png" "file://$PWD/linkedin-perso.html"
  Puis déposer le PNG sur Drive 04_IDENTITE-MARQUE/Social (destination du registre).
-->
<head>
<meta charset="utf-8">
<style>
  /* DM Serif Display vendué dans le repo (rendu déterministe, sans réseau) */
  @font-face{
    font-family:'DM Serif Display';
    src:url('../tools/fonts/DMSerifDisplay-Regular.ttf') format('truetype');
    font-weight:400; font-style:normal; font-display:block;
  }
  /* DM Sans = police body du design system (CDN ; fallback sans-serif si hors-ligne) */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=block');

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1584px;height:396px;}

  .banner{
    position:relative;width:1584px;height:396px;overflow:hidden;
    /* fond anthracite « élevé » du thème dark + halo terracotta + creux chaud bas-gauche */
    background:
      /* halo terracotta (identité) repoussé vers le coin haut-droit pour ne pas tomber
         pile derrière le texte + creux chaud bas-gauche pour la profondeur */
      radial-gradient(1200px 700px at 80% 2%, rgba(224,120,85,0.11), transparent 60%),
      radial-gradient(900px 560px at 9% 108%, rgba(52,50,47,0.6), transparent 55%),
      #262523;                              /* --background (dark) */
    font-family:'DM Sans',-apple-system,Segoe UI,Helvetica,Arial,sans-serif;
    color:#F5F0EB;                          /* --foreground (dark) */
  }

  /* lignes d'altitude (univers Latitude), très discrètes */
  .topo{position:absolute;inset:0;opacity:.55;}

  .wordmark{
    position:absolute;top:40px;left:72px;
    font-family:'DM Serif Display',Georgia,serif;
    font-size:39px;letter-spacing:-0.01em;color:#F5F0EB;
  }
  .wordmark .dot{color:#E07855;}            /* --primary terracotta */

  /* zone safe : centré horizontalement (mobile rogne les bords),
     remonté (top 44%) pour laisser le bas-gauche à la photo de profil */
  /* décalé légèrement à droite (photo de profil à gauche) + un poil plus bas */
  .center{
    position:absolute;left:0;right:0;top:50%;transform:translate(75px,-50%);
    text-align:center;padding:0 110px;
  }
  .ter{color:#E07855;}
  .hook{
    font-family:'DM Serif Display',Georgia,serif;
    font-size:55px;line-height:1.1;color:#F5F0EB;letter-spacing:-0.005em;
  }
  .sub{
    margin-top:18px;font-weight:500;font-size:29px;line-height:1.38;
    color:#EBE4DB;                          /* plus contrasté que --muted → plus net après compression */
  }
  .cta{
    margin-top:26px;display:inline-flex;align-items:center;gap:12px;
    font-weight:600;font-size:23px;letter-spacing:0.015em;color:#E07855;
    padding:14px 30px;border:2px solid rgba(224,120,85,0.55);border-radius:999px;
    background:rgba(224,120,85,0.07);
  }
  .cta .arrow{font-size:21px;line-height:1;}
</style>
</head>
<body>
  <div class="banner">
    <svg class="topo" viewBox="0 0 1584 396" preserveAspectRatio="none">
      <g fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5">
        <path d="M-50 305 C 300 255, 600 365, 950 285 S 1500 205, 1700 255"/>
        <path d="M-50 345 C 320 305, 640 405, 1000 325 S 1520 255, 1700 305"/>
        <path d="M-50 260 C 280 215, 560 325, 920 245 S 1480 170, 1700 215"/>
      </g>
    </svg>

    <div class="wordmark">Latitude<span class="dot">.</span></div>

    <div class="center">
      <div class="hook">Le vrai levier de votre entreprise,<br><span class="ter">c'est vous.</span></div>
      <div class="sub">Vous prenez de la hauteur, votre entreprise aussi.</div>
      <div class="cta">Diagnostic gratuit <span class="arrow">&#8595;</span></div>
    </div>
  </div>
</body>
</html>
