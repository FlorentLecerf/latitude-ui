<!DOCTYPE html>
<html lang="fr">
<!--
  Logo carré — PAGE ENTREPRISE LinkedIn (et tout emplacement carré/avatar marque).
  Tuile pleine : fond anthracite (#262523) + marque carrée « L. » crème (#FAFAF8) + point
  terracotta (#E07855), reprise EXACTE de ../masters/square-mark-on-dark.svg.
  LinkedIn arrondit les coins lui-même → on livre un carré plein, haute déf.
  Base 800×800, rendu en 2× → 1600×1600 (le glyphe est vectoriel, net à toute taille).

  RENDU (depuis brand/banners/) :
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
      --disable-gpu --force-device-scale-factor=2 --hide-scrollbars \
      --virtual-time-budget=2000 --window-size=800,800 \
      --screenshot="linkedin-company-logo.png" "file://$PWD/linkedin-company-logo.html"
-->
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:800px;height:800px;}
  .tile{width:800px;height:800px;background:#262523;display:flex;align-items:center;justify-content:center;}
  .tile svg{width:470px;height:470px;}   /* ~59% → marge d'air autour du L. */
</style>
</head>
<body>
  <div class="tile">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Latitude">
      <g transform="translate(119.0 808.0) scale(0.9549)">

        <path d="M690 15Q654 15 629-10Q604-35 604-70Q604-105 629-131Q654-157 690-157Q726-157 751-131Q776-105 776-70Q776-35 751-10Q726 15 690 15" fill="#E07855"/>
      </g>
    </svg>
  </div>
</body>
</html>
